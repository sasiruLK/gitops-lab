apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-agents
  namespace: argocd
  labels:
    app.kubernetes.io/name: monitoring-agents
    app.kubernetes.io/part-of: monitoring
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/sasiruLK/gitops-lab.git
    targetRevision: main
    path: apps/monitoring-agents
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
