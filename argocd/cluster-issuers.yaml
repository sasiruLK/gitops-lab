apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    app.kubernetes.io/name: letsencrypt
    app.kubernetes.io/component: staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: sasiruravihansa@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
      - http01:
          ingress:
            class: traefik
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-cloudflare-prod
  labels:
    app.kubernetes.io/name: letsencrypt
    app.kubernetes.io/component: cloudflare-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: sasiruravihansa@gmail.com
    privateKeySecretRef:
      name: letsencrypt-cloudflare-prod
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app.kubernetes.io/name: letsencrypt
    app.kubernetes.io/component: production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: sasiruravihansa@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: traefik
