apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tinycloud-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sasiruLK/gitops-lab.git
    targetRevision: main
    path: apps/tinycloud-demo
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
