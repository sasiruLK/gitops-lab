apiVersion: apps/v1
kind: Deployment
metadata:
  name: monsters-rolodex
  labels:
    app.kubernetes.io/name: monsters-rolodex
    app.kubernetes.io/managed-by: tinycloud
    tinycloud.io/managed-by: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: monsters-rolodex
  template:
    metadata:
      labels:
        app.kubernetes.io/name: monsters-rolodex
        tinycloud.io/managed-by: platform
    spec:
      imagePullSecrets:
        - name: ocir-creds
      containers:
        - name: monsters-rolodex
          image: iad.ocir.io/idzghas4xwzv/tinycloud/monsters-rolodex:a0eb6c07ecea25c6d68ef21c89cb2ac2542a0d38
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi

