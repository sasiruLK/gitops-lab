apiVersion: apps/v1
kind: Deployment
metadata:
  name: htmx-counter
  labels:
    app.kubernetes.io/name: htmx-counter
    app.kubernetes.io/managed-by: tinycloud
    tinycloud.io/managed-by: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: htmx-counter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: htmx-counter
        tinycloud.io/managed-by: platform
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: htmx-counter
          image: ghcr.io/sasirulk/htmx-counter:d7f5c74b23a4dad006b3ad7475347e880cb571aa
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi

