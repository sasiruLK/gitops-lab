apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tinycloud-api
  namespace: tinycloud
  labels:
    app.kubernetes.io/name: tinycloud-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: tinycloud-platform
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`api.tinycloud.local`) && PathPrefix(`/v1`)
      kind: Rule
      services:
        - name: tinycloud-api
          port: 8080
