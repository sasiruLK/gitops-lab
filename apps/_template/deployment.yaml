apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{APP_NAME}}
  labels:
    app.kubernetes.io/name: {{APP_NAME}}
    app.kubernetes.io/managed-by: tinycloud
    tinycloud.io/managed-by: platform
spec:
  replicas: {{REPLICAS}}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{APP_NAME}}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{APP_NAME}}
        tinycloud.io/managed-by: platform
    spec:
      imagePullSecrets:
        - name: ocir-creds
      containers:
        - name: {{APP_NAME}}
          image: {{IMAGE}}:{{TAG}}
          imagePullPolicy: Always
          ports:
            - containerPort: {{PORT}}
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
{{ENV_VARS}}
