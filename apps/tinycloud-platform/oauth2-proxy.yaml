apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: tinycloud
  labels:
    app.kubernetes.io/name: oauth2-proxy
    app.kubernetes.io/part-of: tinycloud-platform
    app.kubernetes.io/component: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: oauth2-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oauth2-proxy
        app.kubernetes.io/component: auth
        app.kubernetes.io/part-of: tinycloud-platform
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --provider=github
            - --github-user=sasiruLK
            - --email-domain=*
            - --upstream=http://tinycloud-api:8080
            - --upstream=http://tinycloud-ui:80
            - --http-address=0.0.0.0:4180
            - --redirect-url=https://tinycloud-platform.duckdns.org/oauth2/callback
            - --cookie-domain=tinycloud-platform.duckdns.org
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --cookie-name=_tinycloud_session
            - --whitelist-domain=tinycloud-platform.duckdns.org
            - --reverse-proxy=true
            - --silence-ping-logging=true
            - --skip-auth-regex=^/v1/health$
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-github
                  key: client-id
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-github
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-github
                  key: cookie-secret
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
          ports:
            - containerPort: 4180
              name: http
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 4180
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: tinycloud
  labels:
    app.kubernetes.io/name: oauth2-proxy
spec:
  selector:
    app.kubernetes.io/name: oauth2-proxy
  ports:
    - port: 4180
      targetPort: 4180
      name: http
  type: ClusterIP
