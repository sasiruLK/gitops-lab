apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-proxy-config
  namespace: tinycloud
  labels:
    app.kubernetes.io/name: nginx-proxy
    app.kubernetes.io/part-of: tinycloud-platform
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;

      resolver RESOLVER_IP valid=30s ipv6=off;

      location /api/ {
        proxy_pass http://tinycloud-api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Auth-Request-User $http_x_forwarded_user;
        proxy_set_header X-Auth-Request-Email $http_x_forwarded_email;
      }

      location ~ ^/apps/([^/]+)/?(.*)$ {
        set $app $1;
        set $path $2;
        proxy_pass http://$app.$app.svc.cluster.local/$path$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Auth-Request-User $http_x_forwarded_user;
        proxy_set_header X-Auth-Request-Email $http_x_forwarded_email;
      }

      location / {
        proxy_pass http://tinycloud-ui:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Auth-Request-User $http_x_forwarded_user;
        proxy_set_header X-Auth-Request-Email $http_x_forwarded_email;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-proxy
  namespace: tinycloud
  labels:
    app.kubernetes.io/name: nginx-proxy
    app.kubernetes.io/part-of: tinycloud-platform
    app.kubernetes.io/component: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-proxy
        app.kubernetes.io/component: proxy
        app.kubernetes.io/part-of: tinycloud-platform
    spec:
      priorityClassName: platform
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 101
      initContainers:
        - name: setup
          image: nginx:alpine
          command: ["/bin/sh", "-c"]
          args:
            - mkdir -p /var/cache/nginx/client_temp
              /var/cache/nginx/proxy_temp
              /var/cache/nginx/fastcgi_temp
              /var/cache/nginx/uwsgi_temp
              /var/cache/nginx/scgi_temp
              /var/run
              /var/log/nginx
              /tmp/nginx
              && cp -r /etc/nginx/* /tmp/nginx/
              && NAMESERVER=$(awk '/^nameserver/ {print $2; exit}' /etc/resolv.conf)
              && sed -i "s/RESOLVER_IP/$NAMESERVER/" /tmp/nginx/conf.d/default.conf
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsUser: 101
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d
            - name: var-cache
              mountPath: /var/cache/nginx
            - name: var-run
              mountPath: /var/run
            - name: var-log
              mountPath: /var/log/nginx
            - name: tmp-nginx
              mountPath: /tmp/nginx
      containers:
        - name: nginx
          image: nginx:alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsUser: 101
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          volumeMounts:
            - name: var-cache
              mountPath: /var/cache/nginx
            - name: var-run
              mountPath: /var/run
            - name: var-log
              mountPath: /var/log/nginx
            - name: tmp-nginx
              mountPath: /etc/nginx
      volumes:
        - name: config
          configMap:
            name: nginx-proxy-config
        - name: var-cache
          emptyDir: {}
        - name: var-run
          emptyDir: {}
        - name: var-log
          emptyDir: {}
        - name: tmp-nginx
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-proxy
  namespace: tinycloud
  labels:
    app.kubernetes.io/name: nginx-proxy
    app.kubernetes.io/part-of: tinycloud-platform
spec:
  selector:
    app.kubernetes.io/name: nginx-proxy
  ports:
    - port: 80
      targetPort: 8080
      name: http
  type: ClusterIP
