# Lets onboarded app PreSync hooks read ghcr-creds from argocd and copy into their namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ghcr-creds-reader
  namespace: argocd
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ghcr-creds"]
    verbs: ["get"]
