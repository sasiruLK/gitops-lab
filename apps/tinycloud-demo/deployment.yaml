apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinycloud-demo
  namespace: demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tinycloud-demo
  template:
    metadata:
      labels:
        app: tinycloud-demo
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: tinycloud-demo
          image: ghcr.io/sasirulk/tinycloud-demo-app
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
