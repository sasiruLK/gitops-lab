apiVersion: apps/v1
kind: Deployment
metadata:
  name: tinycloud-ui
  namespace: tinycloud
  labels:
    app.kubernetes.io/name: tinycloud-ui
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: tinycloud-platform
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tinycloud-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tinycloud-ui
        app.kubernetes.io/component: ui
        app.kubernetes.io/part-of: tinycloud-platform
    spec:
      imagePullSecrets:
        - name: ocir-creds
      priorityClassName: platform
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ui
          image: iad.ocir.io/idzghas4xwzv/tinycloud/tinycloud-platform-ui:f67788cea249eb0b647e80af115bb89a96b7d32e
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: API_BASE_URL
              value: "/api"
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
