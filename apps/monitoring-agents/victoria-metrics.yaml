apiVersion: v1
kind: Service
metadata:
  name: victoria-metrics
  namespace: monitoring
  labels:
    app.kubernetes.io/name: victoria-metrics
    app.kubernetes.io/part-of: monitoring
spec:
  selector:
    app.kubernetes.io/name: victoria-metrics
  ports:
    - name: http
      port: 8428
      targetPort: 8428
      nodePort: 30428
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoria-metrics
  namespace: monitoring
  labels:
    app.kubernetes.io/name: victoria-metrics
    app.kubernetes.io/part-of: monitoring
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: victoria-metrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: victoria-metrics
        app.kubernetes.io/part-of: monitoring
    spec:
      containers:
        - name: victoria-metrics
          image: victoriametrics/victoria-metrics:v1.102.1
          args:
            - --storageDataPath=/storage
            - --httpListenAddr=:8428
            - --retentionPeriod=14d
          ports:
            - containerPort: 8428
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          volumeMounts:
            - name: storage
              mountPath: /storage
      volumes:
        - name: storage
          emptyDir:
            sizeLimit: 2Gi
