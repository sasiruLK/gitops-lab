apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog
  namespace: tinycloud
  labels:
    app.kubernetes.io/name: blog
    app.kubernetes.io/component: blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blog
        app.kubernetes.io/component: blog
    spec:
      imagePullSecrets:
        - name: ghcr-creds
      containers:
        - name: blog
          image: ghcr.io/sasirulk/blog:95da67ec41f1a11e1d53e2104d166af1aa3c0b3b
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
