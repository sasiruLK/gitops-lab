apiVersion: v1
kind: ServiceAccount
metadata:
  name: pull-secret-sync
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pull-secret-sync
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pull-secret-sync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pull-secret-sync
subjects:
  - kind: ServiceAccount
    name: pull-secret-sync
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: react-app-4-read-ocir-creds
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ocir-creds-reader
subjects:
  - kind: ServiceAccount
    name: pull-secret-sync
    namespace: react-app-4
---
apiVersion: batch/v1
kind: Job
metadata:
  name: sync-ocir-creds
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: pull-secret-sync
      restartPolicy: Never
      containers:
        - name: sync
          image: bitnami/kubectl:1.32.4
          command:
            - /bin/bash
            - -ec
            - |
              kubectl get secret ocir-creds -n argocd -o yaml | \
                sed "s/namespace: argocd/namespace: react-app-4/" | \
                grep -vE '^\s*(resourceVersion|uid|creationTimestamp):' | \
                kubectl apply -f -
